<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吳凡數學｜高一高二新生專區</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入現代無襯線字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="new.ico">
  
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 網點背景，增加現代科技感 */
        body {
            background-color: #fafafa;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* 鎖定 A4 比例 (寬 21 : 高 29.7) */
        .a4-ratio {
            aspect-ratio: 210 / 297;
        }

        /* 隱藏捲動條但保留功能 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 平滑浮現動畫 */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* 圖片佔位符優化 */
        .img-placeholder {
            background: linear-gradient(120deg, #f3f4f6 0%, #ffffff 50%, #f3f4f6 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-gray-900 antialiased selection:bg-brand-500 selection:text-white">

    <!-- 頂部導覽列 (毛玻璃效果) -->
    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 transition-all duration-300" id="navbar">
        <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="font-bold tracking-wider text-gray-900">吳凡數學</span>
            </div>
            <span class="text-sm font-medium text-gray-500">新生專區</span>
        </div>
    </nav>

    <!-- 標題區塊 (Hero Section) -->
    <header class="pt-24 pb-6 px-6 text-center max-w-3xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-black tracking-tight text-gray-900 mb-4">
            吳凡數學<span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-blue-400">新生專區</span>
        </h1>
        <p class="text-gray-500 text-base md:text-lg max-w-md mx-auto mb-8">
            為您的孩子規劃最適合的學習藍圖！
        </p>

        <!-- 膠囊型左右選單 -->
        <div class="flex justify-center">
            <div class="bg-gray-200/60 p-1.5 rounded-full inline-flex relative shadow-inner">
                <button id="tab-grade1" onclick="switchTab('grade1')" class="px-6 py-2.5 rounded-full text-sm font-bold bg-white text-brand-600 shadow-[0_2px_8px_rgb(0,0,0,0.08)] transition-all duration-300 whitespace-nowrap min-w-[120px] text-center">
                    高一專區
                </button>
                <button id="tab-grade2" onclick="switchTab('grade2')" class="px-6 py-2.5 rounded-full text-sm font-medium text-gray-500 hover:text-gray-700 transition-all duration-300 whitespace-nowrap min-w-[120px] text-center">
                    高二專區
                </button>
            </div>
        </div>
    </header>

    <!-- 開課資訊展示區塊 (動態生成) -->
    <main id="course-container" class="max-w-2xl mx-auto px-5 pb-32 space-y-10 mt-6">
        <!-- 這裡的內容會由下方的 JSON 資料自動載入 -->
    </main>

    <!-- 簡約頁尾 -->
    <footer class="border-t border-gray-200 bg-white py-10 text-center mt-auto">
        <p class="text-sm font-medium text-gray-400">Copyright © 2026. Wufan Math All rights reserved.</p>
    </footer>

    <!-- 回到頂部 -->
    <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
        class="fixed bottom-6 right-6 w-12 h-12 bg-white text-gray-900 rounded-full shadow-[0_4px_20px_rgb(0,0,0,0.1)] flex items-center justify-center opacity-0 translate-y-4 transition-all duration-300 pointer-events-none hover:bg-gray-50 z-50 border border-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
        </svg>
    </button>

    <script>
        // 頂部導覽列滾動陰影效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                navbar.classList.add('shadow-sm');
            } else {
                navbar.classList.remove('shadow-sm');
            }
        });

        // 控制「回到頂部」按鈕
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTopBtn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                backToTopBtn.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
            } else {
                backToTopBtn.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                backToTopBtn.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
            }
        });

        // --- 1. 開課資訊 JSON 資料庫 ---
        // 分為 高一 (grade1) 和 高二 (grade2)
        const courseData = {
            grade1: [
                {
                    imageSrc: "高一開課資訊-1.png",
                    altText: "高一開課資訊 1"
                },
                {
                    imageSrc: "高一開課資訊-2.png",
                    altText: "高一開課資訊 2"
                },
                {
                    imageSrc: "高一開課資訊-3.png",
                    altText: "高一開課資訊 3"
                },
                {
                    imageSrc: "高一開課資訊-4.png",
                    altText: "高一開課資訊 4"
                },
                {
                    imageSrc: "高一開課資訊-5.png",
                    altText: "高一開課資訊 5"
                }
                
            ],
            grade2: [
                {
                    imageSrc: "高二開課資訊-1.png",
                    altText: "高二開課資訊 1"
                },
                {
                    imageSrc: "高二開課資訊-2.png",
                    altText: "高二開課資訊 2"
                },
                {
                    imageSrc: "高二開課資訊-3.png",
                    altText: "高二開課資訊 3"
                },
                {
                    imageSrc: "高二開課資訊-4.png",
                    altText: "高二開課資訊 4"
                },
            ]
        };

        // --- 2. 現代感平滑浮現動畫的觀察器 ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.1,
            rootMargin: "0px 0px -50px 0px"
        });

        // --- 3. 動態渲染邏輯 ---
        const container = document.getElementById('course-container');
        
        function renderCourses(grade) {
            // 清空目前的內容
            container.innerHTML = '';

            // 根據傳入的年級渲染對應的圖片
            courseData[grade].forEach(item => {
                const article = document.createElement('article');
                article.className = 'reveal flex flex-col items-center';
                
                // 注意這裡移除了下方的文字說明區塊
                article.innerHTML = `
                    <div class="relative w-full group">
                        <div class="absolute -inset-1 bg-gradient-to-b from-brand-100 to-transparent rounded-3xl blur-lg opacity-50 group-hover:opacity-70 transition duration-500"></div>
                        <div class="relative w-full bg-white rounded-2xl md:rounded-3xl overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100/50">
                            <img 
                                src="${item.imageSrc}" 
                                alt="${item.altText}" 
                                class="w-full h-auto a4-ratio object-cover img-placeholder" 
                                loading="lazy"
                                onerror="this.src='https://via.placeholder.com/210x297?text=圖片載入中...'">
                        </div>
                    </div>
                `;
                container.appendChild(article);
            });

            // 重新綁定動畫觀察器
            document.querySelectorAll('.reveal').forEach((el) => {
               observer.observe(el);
            });
        }

        // --- 4. 切換選單邏輯 ---
        function switchTab(grade) {
            const tab1 = document.getElementById('tab-grade1');
            const tab2 = document.getElementById('tab-grade2');

            // 定義啟動和未啟動的樣式
            const activeClass = ['font-bold', 'bg-white', 'text-brand-600', 'shadow-[0_2px_8px_rgb(0,0,0,0.08)]'];
            const inactiveClass = ['font-medium', 'text-gray-500', 'hover:text-gray-700', 'bg-transparent', 'shadow-none'];

            if (grade === 'grade1') {
                tab1.classList.remove(...inactiveClass);
                tab1.classList.add(...activeClass);
                
                tab2.classList.remove(...activeClass);
                tab2.classList.add(...inactiveClass);
            } else {
                tab2.classList.remove(...inactiveClass);
                tab2.classList.add(...activeClass);
                
                tab1.classList.remove(...activeClass);
                tab1.classList.add(...inactiveClass);
            }

            // 切換後重新渲染圖片並捲動到頂部
            renderCourses(grade);
        }

        // 頁面載入時預設顯示高一專區
        document.addEventListener('DOMContentLoaded', () => {
            renderCourses('grade1');
        });

    </script>
</body>
</html>
